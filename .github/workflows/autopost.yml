name: Playwright Auto Post to X

on:
  schedule:
#    - cron: '0 */3 * * *' # Triggers every 3 hours
  workflow_dispatch: # Allows manual triggers

jobs:
  run-browser-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright feedparser
          playwright install chromium --with-deps

      - name: Execute Browser Automation
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: python tweet_browser.py

